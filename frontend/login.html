<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

        <title>Book Reviewing Site</title>
    </head>
    <body>
        <div class="centre">
            <h1>-Login-</h1>
            <button class="theme-switch" id="theme-switch">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor"><path d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Zm0-80q88 0 158-48.5T740-375q-20 5-40 8t-40 3q-123 0-209.5-86.5T364-660q0-20 3-40t8-40q-78 32-126.5 102T200-480q0 116 82 198t198 82Zm-10-270Z"/></svg>
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor"><path d="M565-395q35-35 35-85t-35-85q-35-35-85-35t-85 35q-35 35-35 85t35 85q35 35 85 35t85-35Zm-226.5 56.5Q280-397 280-480t58.5-141.5Q397-680 480-680t141.5 58.5Q680-563 680-480t-58.5 141.5Q563-280 480-280t-141.5-58.5ZM200-440H40v-80h160v80Zm720 0H760v-80h160v80ZM440-760v-160h80v160h-80Zm0 720v-160h80v160h-80ZM256-650l-101-97 57-59 96 100-52 56Zm492 496-97-101 53-55 101 97-57 59Zm-98-550 97-101 59 57-100 96-56-52ZM154-212l101-97 55 53-97 101-59-57Zm326-268Z"/></svg>
            </button>
            <div class="auth-form">
                <form id="login-form" method="POST">
                    <div class="message">
                        {{ msg }}
                        {% with messages = get_flashed_messages()%}
                        {% if messages%}
                            {% for message in messages%}
                            <p>{{ message }}</p>
                            {%endfor%}
                        {%endif%}
                        {%endwith%}
                    </div>

                    <div class="auth-field">
                        <p class="field-title">Username:</p>
                        <input class="text-input" type="text" name="username" placeholder="Enter Username..." required>
                    </div>

                    <div class="auth-field">
                        <p class="field-title">Password:</p>
                        <input class="text-input" id="password" type="password" name="password" placeholder="Enter Password..." required>
                        <button class="pass-vis" id="pass-vis" type="button">
                            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor"><path d="M607.5-372.5Q660-425 660-500t-52.5-127.5Q555-680 480-680t-127.5 52.5Q300-575 300-500t52.5 127.5Q405-320 480-320t127.5-52.5Zm-204-51Q372-455 372-500t31.5-76.5Q435-608 480-608t76.5 31.5Q588-545 588-500t-31.5 76.5Q525-392 480-392t-76.5-31.5ZM214-281.5Q94-363 40-500q54-137 174-218.5T480-800q146 0 266 81.5T920-500q-54 137-174 218.5T480-200q-146 0-266-81.5ZM480-500Zm207.5 160.5Q782-399 832-500q-50-101-144.5-160.5T480-720q-113 0-207.5 59.5T128-500q50 101 144.5 160.5T480-280q113 0 207.5-59.5Z"/></svg>
                            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor"><path d="m644-428-58-58q9-47-27-88t-93-32l-58-58q17-8 34.5-12t37.5-4q75 0 127.5 52.5T660-500q0 20-4 37.5T644-428Zm128 126-58-56q38-29 67.5-63.5T832-500q-50-101-143.5-160.5T480-720q-29 0-57 4t-55 12l-62-62q41-17 84-25.5t90-8.5q151 0 269 83.5T920-500q-23 59-60.5 109.5T772-302Zm20 246L624-222q-35 11-70.5 16.5T480-200q-151 0-269-83.5T40-500q21-53 53-98.5t73-81.5L56-792l56-56 736 736-56 56ZM222-624q-29 26-53 57t-41 67q50 101 143.5 160.5T480-280q20 0 39-2.5t39-5.5l-36-38q-11 3-21 4.5t-21 1.5q-75 0-127.5-52.5T300-500q0-11 1.5-21t4.5-21l-84-82Zm319 93Zm-151 75Z"/></svg>
                        </button>
                    </div>

                    <div class="auth-field">
                        <input id="remember-check" class="checkbox-input" type="checkbox" name="remember" />
                        Remember Me?
                    </div>

                    <button class="dash-button" type="submit">Login</button>
                </form>
                <p>Don't yet have an account? <a href="{{ url_for('register') }}">Register</a></p>
            </div>
        </div>

        
        <script type="module">
            import { authLogin } from "{{ url_for('static', filename='src/services/auth.js') }}";
            document.getElementById("login-form").addEventListener('submit', async function(event) {
                event.preventDefault();
                try {
                    let username = event.target.username.value;
                    let password = event.target.password.value;
                    await authLogin(username, password);
                    window.location.href = "/";
                } catch (error) {
                    alert("Incorrect credentials!")
                    console.error("Failed: ", error);
                }
            });
        </script>
        <script src="{{ url_for('static', filename='darkmode.js') }}" defer></script>
        <script src="{{ url_for('static', filename='password_vis.js') }}" defer></script>
        
    </body>
</html>
