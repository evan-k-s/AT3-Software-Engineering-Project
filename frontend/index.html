<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <link rel="stylesheet" href="style.css">

        <title>Book Reviewing Site</title>
    </head>
    <body>
        <div class="navbar">
            <ul>
                <li><h3>Navigation Bar</h3></li>
                <li><a class="active" href="#">Dashboard</a></li>
                <li><a href="#">My Reviews</a></li>
                <li><a href="#">Book Recommendations</a></li>
                <li><a href="#">Saved Recommendations</a></li>
        </div>
        <div class="content">
            <h1>Dashboard</h1>
            <button type="button">Create New Review</button>
            <div class="reviews-dash">
                <h2>Recent Reviews</h2>
                <div class="h-reviews-scroller">
                    <div class="review-card">
                        <p class="review-card-title">Test Book 1</p>
                        <img src="https://t4.ftcdn.net/jpg/03/64/17/57/360_F_364175760_dcXwFAHAjqzVEjBN7tpvSyQmlOe2IEVl.jpg" alt="">
                        <p class="review-card-author">Author 1</p>
                    </div>
                    <div class="review-card">
                        <p class="review-card-title">Test Book 2</p>
                        <img src="https://t4.ftcdn.net/jpg/02/59/01/81/360_F_259018158_a4Qrd7gHqlE9ZUOUo7mNOtD3uaqWJckj.jpg" alt="">
                        <p class="review-card-author">Author 2</p>
                    </div>
                    <div class="review-card">
                        <p class="review-card-title">Test Book 3</p>
                        <img src="https://static.vecteezy.com/system/resources/thumbnails/001/427/552/small/ornamental-book-cover-design-free-vector.jpg" alt="">
                        <p class="review-card-author">Author 3</p>
                    </div>
                    <div class="review-card">
                        <p class="review-card-title">Test Book 4</p>
                        <img src="https://static.vecteezy.com/system/resources/thumbnails/003/031/712/small/ornamental-book-cover-design-free-vector.jpg" alt="">
                        <p class="review-card-author">Author 4</p>
                    </div>
                    <div class="review-card">
                        <p class="review-card-title">Test Book 5</p>
                        <img src="https://cdn.vectorstock.com/i/500p/17/96/elegant-antique-book-cover-vector-46551796.jpg" alt="">
                        <p class="review-card-author">Author 5</p>
                    </div>
                    <div class="review-card">
                        <p class="review-card-title">Test Book 6</p>
                        <img src="https://img.freepik.com/premium-vector/old-book-cover-design-elements_443748-347.jpg" alt="">
                        <p class="review-card-author">Author 6</p>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
